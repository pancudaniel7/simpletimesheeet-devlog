  <circle cx="1082" cy="232" r="33" fill="#10171a"/>
  <circle cx="879" cy="240" r="9" fill="#ffffff"/>
  <circle cx="1073" cy="222" r="9" fill="#ffffff"/>

  <!-- muzzle / beige snout -->
  <path d="M 928 360
