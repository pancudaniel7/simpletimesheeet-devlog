<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <!-- background -->
  <rect width="1200" height="627" fill="#77D4DE"/>

  <!-- ================= TEXT (left) ================= -->
  <text x="80" y="150" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="3" fill="#0c2a2e">POST 5  /  WHY I PICKED GO</text>

  <text x="78" y="270" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#0c1a1c">My entire SaaS</text>
  <text x="78" y="342" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#0c1a1c">backend is</text>
  <text x="78" y="414" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#c65a10">one 20 MB file.</text>

  <text x="80" y="486" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#0c2a2e">No runtime. 75 MB of RAM. One static binary.</text>

  <text x="80" y="565" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#0c1a1c">simpletimesheeet.eu</text>

  <!-- ================= GOPHER (right) ================= -->
  <g stroke="#10171a" stroke-width="9" stroke-linejoin="round" stroke-linecap="round">
    <!-- left eye -->
