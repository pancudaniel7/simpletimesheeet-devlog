    <path d="M 930 452 q -14 0 -14 16 l 0 34 q 0 14 14 14 l 4 0 0 -64 z"/>
    <path d="M 966 452 q 14 0 14 16 l 0 34 q 0 14 -14 14 l -4 0 0 -64 z"/>
