<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#1c1917"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.85">
      <stop offset="0" stop-color="#ea7a2c" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ea7a2c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ea7a2c"/>
      <stop offset="1" stop-color="#f59e57"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Header: clock mark + wordmark -->
  <g transform="translate(90,92)">
    <circle cx="30" cy="30" r="27" fill="none" stroke="#ea7a2c" stroke-width="6"/>
    <line x1="30" y1="30" x2="30" y2="14" stroke="#ea7a2c" stroke-width="6" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="43" y2="37" stroke="#ea7a2c" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="166" y="132" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#fafaf9">simpletimesheeet</text>
  <text x="166" y="166" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#78716c">simpletimesheeet.eu</text>

  <!-- Eyebrow -->
  <text x="90" y="320" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6" fill="#ea7a2c">BUILD IN PUBLIC</text>

  <!-- Headline -->
  <text x="88" y="412" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="#fafaf9">I built a SaaS.</text>
  <text x="90" y="478" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="400" fill="#a8a29e">Now I am documenting how, in 51 posts.</text>

  <!-- Product mockup card -->
  <g transform="translate(90,560)">
    <rect x="0" y="0" width="1020" height="448" rx="28" fill="#1c1917" stroke="#292524" stroke-width="2"/>
    <!-- window dots -->
    <circle cx="40" cy="44" r="9" fill="#44403c"/>
    <circle cx="70" cy="44" r="9" fill="#44403c"/>
    <circle cx="100" cy="44" r="9" fill="#44403c"/>
    <text x="150" y="52" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#a8a29e">June 2026  ·  Timesheet</text>
    <line x1="0" y1="84" x2="1020" y2="84" stroke="#292524" stroke-width="2"/>

    <!-- rows: day label + hour bar -->
    <g font-family="Helvetica, Arial, sans-serif">
      <!-- Mon -->
      <text x="40" y="150" font-size="26" font-weight="500" fill="#d6d3d1">Mon</text>
      <rect x="180" y="128" width="640" height="30" rx="15" fill="#292524"/>
      <rect x="180" y="128" width="640" height="30" rx="15" fill="url(#bar)"/>
      <text x="900" y="150" font-size="24" font-weight="600" fill="#fafaf9">8h</text>
      <!-- Tue -->
      <text x="40" y="216" font-size="26" font-weight="500" fill="#d6d3d1">Tue</text>
      <rect x="180" y="194" width="640" height="30" rx="15" fill="#292524"/>
      <rect x="180" y="194" width="640" height="30" rx="15" fill="url(#bar)"/>
      <text x="900" y="216" font-size="24" font-weight="600" fill="#fafaf9">8h</text>
      <!-- Wed (partial) -->
      <text x="40" y="282" font-size="26" font-weight="500" fill="#d6d3d1">Wed</text>
      <rect x="180" y="260" width="640" height="30" rx="15" fill="#292524"/>
      <rect x="180" y="260" width="400" height="30" rx="15" fill="url(#bar)"/>
      <text x="900" y="282" font-size="24" font-weight="600" fill="#fafaf9">5h</text>
      <!-- Thu -->
      <text x="40" y="348" font-size="26" font-weight="500" fill="#d6d3d1">Thu</text>
      <rect x="180" y="326" width="640" height="30" rx="15" fill="#292524"/>
      <rect x="180" y="326" width="640" height="30" rx="15" fill="url(#bar)"/>
      <text x="900" y="348" font-size="24" font-weight="600" fill="#fafaf9">8h</text>
    </g>

    <line x1="0" y1="384" x2="1020" y2="384" stroke="#292524" stroke-width="2"/>
    <text x="40" y="424" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#fafaf9">Total  168h</text>
    <!-- export pill -->
    <rect x="800" y="400" width="180" height="42" rx="21" fill="#ea7a2c"/>
    <text x="890" y="428" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0c0a09">Export PDF</text>
  </g>

  <!-- Footer badges -->
  <g transform="translate(90,1070)">
    <rect x="0" y="0" width="150" height="56" rx="28" fill="none" stroke="#ea7a2c" stroke-width="3"/>
    <text x="75" y="38" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ea7a2c">FREE</text>
    <text x="186" y="38" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#a8a29e">for freelancers &amp; small companies</text>
  </g>
</svg>
